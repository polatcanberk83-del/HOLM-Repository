name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Debug — list tracked src/assets and vite version
        run: |
          node --version
          npm --version
          npx vite --version
          echo '--- src/assets ---'
          ls -la src/assets || true
          echo '--- src root ---'
          ls -la src || true

      - name: Build
        id: build
        run: |
          set +e
          npm run build > build.log 2>&1
          EXIT=$?
          echo "----- build.log -----"
          cat build.log
          exit $EXIT
        env:
          VITE_BASE_PATH: /

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Publish build.log to ci-log branch on failure
        if: failure()
        run: |
          git config user.name  "ci-log-bot"
          git config user.email "ci@holm"
          BR=ci-log-$(date +%s)
          git checkout --orphan "$BR"
          git rm -rf --cached . || true
          git clean -fdx -e build.log -e .git
          git add build.log
          git commit -m "ci: build.log for ${{ github.sha }}"
          git push origin "$BR"
          echo "Log pushed to branch $BR"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
