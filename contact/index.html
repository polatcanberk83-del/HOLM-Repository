    <script>
      // Sync flash-preventer — if we arrived via a page transition,
      // paint the page dark from the very first frame so the block
      // cover reads as continuous with the previous page's cover.

        if (sessionStorage.getItem("holm:transition") === "1") {
          document.documentElement.classList.add("holm-entering");
        }
      } catch (_) {}
    </script>
